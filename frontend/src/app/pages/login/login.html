<section class="login-page">
  <div class="login-page__inner">
    <nav class="login-page__nav" aria-label="Breadcrumb">
      <a routerLink="/" class="login-page__back">← Back to Home</a>
    </nav>

    <h1 class="login-page__title">Admin login</h1>

    <div class="login-card">
      <form [formGroup]="form" (ngSubmit)="submit()" class="login-form" autocomplete="on">
        <div class="login-field">
          <label class="login-label" for="login-user">Username</label>
          <input
            id="login-user"
            class="login-input"
            type="text"
            formControlName="username"
            autocomplete="username"
          />
          @if (form.controls.username.touched && form.controls.username.invalid) {
            <small class="login-error">Required.</small>
          }
        </div>

        <div class="login-field">
          <label class="login-label" for="login-pass">Password</label>
          <input
            id="login-pass"
            class="login-input"
            type="password"
            formControlName="password"
            autocomplete="current-password"
          />
          @if (form.controls.password.touched && form.controls.password.invalid) {
            <small class="login-error">Required.</small>
          }
        </div>

        <button type="submit" class="login-submit" [disabled]="isSubmitting">
          {{ isSubmitting ? 'Signing in…' : 'Sign in' }}
        </button>
      </form>

      @if (error) {
        <p class="login-banner login-banner--error">{{ error }}</p>
      }
    </div>
  </div>
</section>
